<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>V-code Creative Awards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <!-- =========================
       Header
  ========================== -->
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="/">V-CODE CREATIVE AWARDS</a>

      <!-- ナビゲーションメニュー -->
      <nav class="nav" id="nav">
        <ul class="nav-ul">
          <li><a href="/results">受賞作品</a></li>
          <li><a href="/works">みんなの作品</a></li>
        </ul>
      </nav>

      <!-- ハンバーガー -->
      <button class="hamburger" id="hamburger">
        ☰
      </button>

    </div>
  </header>


  <!-- =========================
       Main
  ========================== -->
  <main>

    <!-- =========================
         Hero
    ========================== -->
    <section class="hero">
      <div class="hero-overlay"></div>

      <div class="hero-inner">
        <h2 class="hero-title">
          V-code<br>
          CREATIVE AWARDS<br>
          2026
        </h2>

        <a href="/results" class="cta-button">
          結果発表を見る ▶
        </a>
      </div>
    </section>


    <!-- =========================
         Result Section
    ========================== -->
    <section class="result-section">

      <h2 class="section-title">結果発表はこちらから！</h2>

      <div class="category-buttons">
        <a href="/results?category=game" class="category-button">
          ゲームクリエイション部門
        </a>

        <a href="/results?category=world" class="category-button">
          ワールドデザイン部門
        </a>
      </div>

    </section>


    <!-- =========================
         Works Section
    ========================== -->
    <section class="works-section">

      <div class="section-header">
        <h2>みんなの作品</h2>
        <p>V-code Creative Awardsに応募してくれたみんなの作品です！</p>
      </div>

      <!-- 作品グリッド -->
      <div class="work-grid">

        <a href="/works/001" class="work-card">
          <div class="thumbnail">
            <img src="src/images/thumnails/maze_in_maze.webp" alt="作品サムネイル">
          </div>

          <div class="work-info">
            <h3 class="work-title">作品名: めいろゲーム</h3>
            <p class="work-meta">小学5年 / 山田太郎</p>
          </div>
        </a>

      </div>

      <!-- もっと見る -->
      <div class="more-button-wrap">
        <a href="/works" class="more-button">
          みんなの作品を見る ▶
        </a>
      </div>

    </section>

  </main>


  <!-- =========================
       Footer
  ========================== -->
  <footer class="footer">
  </footer>

</body>

<script type="module" src="/src/main.ts"></script>

</html>
