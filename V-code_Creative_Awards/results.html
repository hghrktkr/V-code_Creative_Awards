<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Results | V-code Creative Awards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  >
</head>

<body>

  <!-- =========================
       Header
  ========================== -->
  <header class="header">

    <div class="header-inner">

      <a class="logo" href="./">
        V-CODE CREATIVE AWARDS
      </a>

      <nav class="nav" id="nav">

        <ul class="nav-ul">
          <li><a href="./results">受賞作品</a></li>
          <li><a href="./works">みんなの作品</a></li>
        </ul>

      </nav>

      <button class="hamburger" id="hamburger">
        ☰
      </button>

    </div>

  </header>

  <!-- =========================
       Main
  ========================== -->
  <main class="results-page">

    <!-- =========================
         Hero
    ========================== -->
    <section class="results-hero">

      <div class="results-hero-overlay"></div>

      <div class="results-hero-inner">

        <h1 class="results-title">
          V-CODE CREATIVE AWARDS
        </h1>

        <h2 class="results-description">
          結果発表
        </h2>

      </div>

    </section>

    <!-- =========================
         Category Select
    ========================== -->
    <section
      class="results-select"
      id="results-select"
    >

      <h2 class="section-title">
        部門
      </h2>

      <div class="category-buttons">

        <button
          class="category-button category-game"
          data-category="game"
        >
          <span class="category-label">
            ゲームクリエイション部門
          </span>

          <span class="category-sub">
            Game Creation
          </span>
        </button>

        <button
          class="category-button category-world"
          data-category="world"
        >
          <span class="category-label">
            ワールドデザイン部門
          </span>

          <span class="category-sub">
            World Design
          </span>
        </button>

      </div>

    </section>

    <!-- =========================
         Intro Animation
    ========================== -->
    <section class="results-intro" id="results-intro">

      <div class="intro-background"></div>

      <div class="intro-particles"></div>

      <div class="intro-content">

        <p class="intro-small">
          V-CODE CREATIVE AWARDS 2026
        </p>

        <h2 class="intro-category" id="intro-category">
        </h2>

        <h1 class="intro-title">
          GOLD AWARD
        </h1>

      </div>

    </section>

    <!-- =========================
         Results Stage
    ========================== -->
    <section
      class="results-stage"
      id="results-stage"
    >

      <!-- 金賞 -->
      <section
        class="gold-stage"
        id="gold-stage"
      >

        <!-- TSで挿入 -->
      </section>

      <!-- その他賞 -->
      <section
        class="other-awards"
        id="other-awards"
      >

        <!-- TSで挿入 -->
      </section>

    </section>

  </main>

  <!-- =========================
       Footer
  ========================== -->
  <footer class="footer">
  </footer>

</body>

<script type="module" src="/src/main.ts"></script>

</html>
